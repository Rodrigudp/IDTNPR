# Perfil de desenvolvimento.
# NÃO contém segredos: as credenciais (DB_PASSWORD, ADMIN_SENHA) vêm do arquivo
# .env (carregado pelo springboot4-dotenv) — o mesmo mecanismo usado em produção.
spring:
  jpa:
    properties:
      hibernate:
        # Mostra o SQL gerado no console durante o desenvolvimento.
        show_sql: true

logging:
  level:
    org.hibernate.SQL: DEBUG
    br.org.idtnpr: DEBUG
